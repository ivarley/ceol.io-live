<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline · ceol.io</title>
  <style>
    /* Self-contained: this page must render with no cached assets. */
    :root { color-scheme: dark light; }
    html, body { height: 100%; margin: 0; }
    body {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100%; padding: 2rem; box-sizing: border-box; text-align: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #1a1a1a; color: #e8e8e8;
    }
    @media (prefers-color-scheme: light) { body { background: #fafafa; color: #1a1a1a; } }
    h1 { font-size: 1.5rem; margin: 0 0 0.5rem; }
    p { margin: 0.25rem 0; max-width: 28rem; line-height: 1.5; opacity: 0.85; }
    .actions { margin-top: 1.5rem; display: flex; gap: 0.75rem; flex-wrap: wrap; justify-content: center; }
    button {
      padding: 0.6rem 1.4rem; font-size: 1rem; cursor: pointer;
      border: none; border-radius: 6px; background: #2d7d46; color: #fff;
    }
    button:hover { background: #256b3b; }
    button.secondary { background: transparent; color: inherit; border: 1px solid currentColor; opacity: 0.8; }
    button.secondary:hover { background: rgba(128, 128, 128, 0.15); }
  </style>
</head>
<body>
  <h1>You're offline</h1>
  <p>This page hasn't been saved for offline use. Reconnect to load it.</p>
  <p>Pages you've already visited and the live logger still work without a connection.</p>
  <div class="actions">
    <button onclick="history.back()">Go back</button>
    <button class="secondary" onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
