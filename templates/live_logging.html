<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <!-- maximum-scale=1 stops mobile browsers auto-zooming when a text field gains focus (app-like locked viewport) -->
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <title>Live Logging (beta)</title>
  <!--
    Spec 024 Phase 0 shell. Clean-slate: deliberately does NOT extend base.html.
    Bootstrap config is inlined for the self-contained Svelte bundle to read.
  -->
  <script>
    window.__LIVE_CONFIG__ = {
      sessionInstanceId: {{ session_instance_id | tojson }},
      sessionPath: {{ session_path | tojson }},
      streamingBaseUrl: {{ streaming_base_url | tojson }},
      currentPerson: {{ current_person | tojson }}
    };
  </script>
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#0e0e10">
  <!-- Favicons (the live shell doesn't extend base.html, so mirror its icon links). -->
  <link rel="icon" type="image/x-icon" href="/static/images/favicon.ico">
  <link rel="icon" type="image/png" sizes="192x192" href="/static/images/android-chrome-192x192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/static/images/android-chrome-512x512.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/static/images/apple-touch-icon.png">
  <!-- Reuse the legacy tune-detail drawer verbatim (same module + styles + incipit
       rendering) so it matches the rest of the app exactly. -->
  <link rel="stylesheet" href="/static/css/tune_detail_modal.css">
  <link rel="stylesheet" href="/static/live/app.css">
  <!-- The SAME app hamburger menu (shared partial/CSS/JS), rendered here and floated
       top-right over the Svelte header. Theme vars map the shared menu onto the live
       editor's always-dark palette. -->
  <link rel="stylesheet" href="/static/css/hamburger_menu.css">
  <script src="/static/js/hamburger_menu.js"></script>
  <style>
    .live-menu {
      --hamburger-line-color: #ececef;
      --dropdown-bg: #18181b; --dropdown-border: #2a2a30; --dropdown-shadow: rgba(0,0,0,0.55);
      --text-color: #ececef; --border-color: #2a2a30; --hover-bg: #23232c;
      --disabled-text: #9a9aa3; --bg-color: #0e0e10;
      position: fixed; top: calc(8px + env(safe-area-inset-top)); right: 8px; z-index: 50;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div class="live-menu">{% with hide_dark_mode = True %}{% include 'hamburger_menu.html' %}{% endwith %}</div>
  {% include 'tune_detail_modal.html' %}
  <script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>
  <script src="/static/js/tune_detail_modal.js"></script>
  <script type="module" src="/static/live/app.js"></script>
</body>
</html>
