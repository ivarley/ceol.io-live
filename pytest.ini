[tool:pytest]
testpaths = tests
# spike/ holds standalone exploration scripts (not pytest tests); they read
# sys.argv at import time and break collection if scanned. Keep them out even
# when pytest is pointed at the repo root.
norecursedirs = spike venv node_modules abc-renderer frontend .git mockups
pythonpath = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --strict-markers
    --strict-config
    --verbose
    --tb=short
    --cov=.
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=80
markers =
    unit: Unit tests
    integration: Integration tests  
    functional: Functional tests
    slow: Slow-running tests
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning